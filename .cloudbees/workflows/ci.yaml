apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Patient Portal CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "SCAN secrets complete - 2 findings HIGH"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "SCAN sast complete - 3 findings CRITICAL hardcoded credentials"
      - name: Mock SCA Scan
        uses: docker://alpine:3.19
        run: |
          echo "SCAN sca complete - 5 vulnerable dependencies"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — Patient Portal
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 2 | HIGH |
            | SAST | 3 | CRITICAL |
            | SCA | 5 | HIGH |

            **Critical Finding**: Hardcoded API_KEY and DB_PASSWORD in src/api/patient.js
            **SLA Status**: OVERDUE — 3 findings past 30-day remediation SLA
            **SBOM Governance**: OPEN — no SBOM generated (CCI-SBOM-001)
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building patient-portal v1.0.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: patient-portal
          version: 1.0.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-patient-portal
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — Patient Portal v1.0.${{ cloudbees.run_number }}
            - **Classification**: HIGH | patient-data | regulated | external-facing
            - **Owner**: Digital Health BU
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed patient-portal v1.0.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-dev

  deploy-staging:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Staging
        uses: docker://alpine:3.19
        run: |
          echo "Deployed patient-portal v1.0.${{ cloudbees.run_number }} to STAGING"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-staging

  deploy-prod:
    needs:
      - build
      - deploy-staging
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed patient-portal v1.0.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-prod
